name: Security Tests

on:
  pull_request:
    branches: ['**']

permissions:
  checks: write
  contents: read

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install SecTester dependencies
      run: npm install --save-dev @sectester/core @sectester/repeater @sectester/scan @sectester/runner

    - name: Start DVWA using Docker Compose
      run: |
        docker compose up -d --wait
      env:
        DB_SERVER: db
        MYSQL_DATABASE: dvwa
        MYSQL_PASSWORD: p@ssw0rd
        MYSQL_ROOT_PASSWORD: dvwa
        MYSQL_USER: dvwa

    - name: Wait for DVWA to be ready
      run: |
        until nc -zv 127.0.0.1 4280; do
          echo "Waiting for DVWA to be ready..."
          sleep 5
        done

    - name: Run security tests
      run: |
        node --experimental-transform-types --experimental-strip-types --experimental-detect-module \
        --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --disable-warning=ExperimentalWarning \
        --test-force-exit --test .brightsec/tests/*.test.ts --test-concurrency=4
      env:
        BRIGHT_HOSTNAME: ${{ vars.BRIGHT_HOSTNAME }}
        BRIGHT_PROJECT_ID: ${{ vars.BRIGHT_PROJECT_ID }}
        BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRIGHT_TARGET_URL: http://127.0.0.1:4280
